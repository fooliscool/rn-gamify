name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  call-high-workflow:
    uses: devkishore/rn-monorepo/.github/workflows/checks-high.yml@main
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
