name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'
      
      - name: Install Yarn
        run: npm install -g yarn@1.22.22
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Run ESLint
        run: yarn lint
      
      - name: Check formatting
        run: yarn format --check
